# Display Config
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y
CONFIG_LV_Z_MEM_POOL_SIZE=16384

# Enable nice!oled custom status screen
CONFIG_NICE_OLED_ON=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y

# Left side screen: Enable Luna dog (showing Lizard logo), use Number for WPM, and disable sleep status art
CONFIG_NICE_OLED_WIDGET_WPM_LUNA=y
CONFIG_NICE_OLED_WIDGET_WPM_BONGO_CAT=n
CONFIG_NICE_OLED_WIDGET_WPM_NUMBER=y
CONFIG_NICE_OLED_WIDGET_WPM_SPEEDOMETER=n
CONFIG_NICE_OLED_WIDGET_WPM_GRAPH=n
CONFIG_NICE_OLED_SHOW_SLEEP_ART_ON_IDLE=n
CONFIG_NICE_OLED_SHOW_SLEEP_ART_ON_SLEEP=n

# Resolution config for 0.91" OLED vertical (32x128)
CONFIG_NICE_OLED_CUSTOM_CANVAS_WIDTH=32
CONFIG_NICE_OLED_CUSTOM_CANVAS_HEIGHT=128

# Invert screen colors: black background, white text
CONFIG_NICE_OLED_WIDGET_INVERTED=y

# Position Layer widget at the top
CONFIG_NICE_OLED_WIDGET_LAYER_CUSTOM_X=0
CONFIG_NICE_OLED_WIDGET_LAYER_CUSTOM_Y=0

# Position Connection status and Profile below Layer
CONFIG_NICE_OLED_WIDGET_OUTPUT_USB_CUSTOM_X=10
CONFIG_NICE_OLED_WIDGET_OUTPUT_USB_CUSTOM_Y=14
CONFIG_NICE_OLED_WIDGET_OUTPUT_BT_CUSTOM_X=10
CONFIG_NICE_OLED_WIDGET_OUTPUT_BT_CUSTOM_Y=12
CONFIG_NICE_OLED_WIDGET_OUTPUT_BT_UNBONDED_CUSTOM_X=10
CONFIG_NICE_OLED_WIDGET_OUTPUT_BT_UNBONDED_CUSTOM_Y=12
CONFIG_NICE_OLED_WIDGET_PROFILE_CUSTOM_X=0
CONFIG_NICE_OLED_WIDGET_PROFILE_CUSTOM_Y=12
CONFIG_NICE_OLED_WIDGET_PROFILE_TEXT_CUSTOM_X=0
CONFIG_NICE_OLED_WIDGET_PROFILE_TEXT_CUSTOM_Y=12

# Position Battery percentage below Output/Profile
CONFIG_NICE_OLED_WIDGET_BATTERY_CUSTOM_X=0
CONFIG_NICE_OLED_WIDGET_BATTERY_CUSTOM_Y=24

# Position WPM label/number below Battery
CONFIG_NICE_OLED_WIDGET_WPM_LABEL_CUSTOM_X=0
CONFIG_NICE_OLED_WIDGET_WPM_LABEL_CUSTOM_Y=36

# Position Lizard logo in the middle
CONFIG_NICE_OLED_WIDGET_LUNA_CUSTOM_X=4
CONFIG_NICE_OLED_WIDGET_LUNA_CUSTOM_Y=50

# Position Modifiers at the bottom (Use BOX 2x2 layout, centered)
CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS_FIXED_VER=n
CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS_FIXED_BOX=y
CONFIG_NICE_OLED_WIDGET_MODIFIERS_CUSTOM_X=1
CONFIG_NICE_OLED_WIDGET_MODIFIERS_CUSTOM_Y=96

# Right side screen: Enable Spaceman animation, disable Cat animation
CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_SPACEMAN=y
CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_CAT=n

# Enable Encoders
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Enable RGB underglow
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=2
CONFIG_ZMK_RGB_UNDERGLOW_SPD_START=1
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n

# Aggressive Power-saving & Sleep Config
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_TIMEOUT=300000
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000
CONFIG_ZMK_EXT_POWER=y

# Bluetooth Power and Stability Tweaks (Fixes wake-up repeat keys bug)
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_ZMK_BLE_EXPERIMENTAL_FEATURES=y

# Debounce Settings to prevent chatter upon wake
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=8
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=8

# Split battery reporting configuration
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
